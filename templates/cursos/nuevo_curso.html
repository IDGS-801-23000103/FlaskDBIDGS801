{% extends "layout.html" %}

{% block container %}

<div class="flex justify-center items-center min-h-screen bg-gray-100">

<div class="bg-white p-6 rounded shadow w-full max-w-md">

<h2 class="text-xl font-bold mb-4 text-center">
Nuevo Curso
</h2>

<form method="POST">

<input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

<div class="mb-3">
<label class="block text-sm">Nombre</label>
<input type="text" name="nombre"
class="w-full border p-2 rounded">
</div>

<div class="mb-3">
<label class="block text-sm">Maestro</label>

<select name="maestro_id"
class="w-full border p-2 rounded">

{% for maestro in maestros %}
<option value="{{ maestro.matricula }}">
{{ maestro.nombre }} {{ maestro.apellidos }}
</option>
{% endfor %}

</select>

</div>

<div class="flex justify-between mt-4">

<a href="{{ url_for('cursos.listado_cursos') }}" 
                   style="background:blue; color:white; padding:8px 16px; border-radius:6px;">
                    Cancelar
                </a>

                <button type="submit"
                    style="background:green; color:white; padding:8px 16px; border-radius:6px;">
                    Guardar
                </button>

</div>

</form>

</div>
</div>

{% endblock %}
