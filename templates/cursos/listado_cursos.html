{% extends "layout.html" %}

{% block container %}

<div class="max-w-screen-xl mx-auto px-4 py-10">

    <div class="flex justify-between items-center mb-6">
        <h2 class="text-2xl font-bold text-gray-800">
            Lista de Cursos
        </h2>

        <a href="{{ url_for('cursos.nuevo_curso') }}">
            <button type="button"
                class="text-white bg-gradient-to-r from-green-400 via-green-500 to-green-600 
                hover:bg-gradient-to-br focus:ring-4 focus:outline-none 
                focus:ring-green-300 font-medium rounded-base 
                text-sm px-5 py-2.5 text-center shadow-md transition">
                Nuevo Curso
            </button>
        </a>
    </div>

    <div class="relative overflow-x-auto bg-white shadow-lg rounded border border-gray-200">
        <table class="w-full text-sm text-left text-gray-600">

            <thead class="text-xs uppercase bg-gray-100 text-gray-700 border-b">
                <tr>
                    <th class="px-6 py-3 text-center">ID</th>
                    <th class="px-6 py-3">Nombre</th>
                    <th class="px-6 py-3">Maestro</th>
                    <th class="px-6 py-3 text-center">Acciones</th>
                </tr>
            </thead>

            <tbody>

                {% for curso in cursos %}

                <tr class="bg-white border-b hover:bg-gray-50 transition">

                    <td class="px-6 py-4 text-center font-medium text-gray-900">
                        {{ curso.id }}
                    </td>

                    <td class="px-6 py-4">
                        {{ curso.nombre }}
                    </td>

                    <td class="px-6 py-4">
                        {{ curso.maestro.nombre }} {{ curso.maestro.apellidos }}
                    </td>

                    <td class="px-6 py-3 text-center">

                        <a href="{{ url_for('cursos.detalle_curso', id=curso.id) }}"
                           style="color: teal;">
                           Detalle
                        </a>

                        |

                        <a href="{{ url_for('cursos.modificar_curso', id=curso.id) }}"
                           style="color: green;">
                           Modificar
                        </a>

                        |

                        <a href="{{ url_for('cursos.eliminar_curso', id=curso.id) }}"
                           style="color: red;">
                           Eliminar
                        </a>

                    </td>

                </tr>

                {% endfor %}

            </tbody>

        </table>
    </div>

</div>

{% endblock %}
