{% extends "layout.html" %}

{% block container %}

<div class="flex justify-center items-center min-h-screen bg-gray-100">

<div class="bg-white p-6 rounded shadow w-full max-w-md">

<h2 class="text-xl font-bold text-red-600 mb-4 text-center">
Eliminar Curso
</h2>

<p class="text-center mb-4">
¿Seguro que deseas eliminar este curso?
</p>

<div class="text-sm mb-4">

<p><b>Nombre:</b> {{ curso.nombre }}</p>
<p><b>Maestro:</b>
{{ curso.maestro.nombre }}
{{ curso.maestro.apellidos }}
</p>

</div>

<form method="POST">

<input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

<div class="flex justify-between">

<a href="{{ url_for('cursos.listado_cursos') }}" 
                   style="background:blue; color:white; padding:8px 16px; border-radius:6px;">
                    Cancelar
                </a>

                <button type="submit"
                    style="background:red; color:white; padding:8px 16px; border-radius:6px;">
                    Eliminar
                </button>
                

</div>

</form>

</div>
</div>

{% endblock %}
